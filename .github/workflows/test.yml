name: UI Tests Pipeline

on:
push:
branches: [ "main" ]
pull_request:
workflow_dispatch:

jobs:
test:
runs-on: ubuntu-latest


steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Make gradlew executable
    run: chmod +x gradlew

  - name: Install Playwright dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        libnss3 \
        libatk-bridge2.0-0 \
        libgtk-3-0 \
        libxss1 \
        libasound2t64 \
        libx11-xcb1 \
        libxcomposite1 \
        libxdamage1 \
        libxrandr2 \
        libgbm1 \
        libpango-1.0-0 \
        libcairo2 \
        libatspi2.0-0

  - name: Run tests
    run: ./gradlew clean test --info

  - name: Import feature to Xray (create tests)
    run: |
      TOKEN=$(curl -s -X POST "https://xray.cloud.getxray.app/api/v2/authenticate" \
        -H "Content-Type: application/json" \
        -d "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" | tr -d '"')

      curl -X POST "https://xray.cloud.getxray.app/api/v2/import/feature" \
        -H "Authorization: Bearer $TOKEN" \
        -F "file=@src/test/resources/features/homepage.feature"

  - name: Upload results to Xray
    if: always()
    run: |
      if [ -f build/cucumber-report.json ]; then
        TOKEN=$(curl -s -X POST "https://xray.cloud.getxray.app/api/v2/authenticate" \
          -H "Content-Type: application/json" \
          -d "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}" | tr -d '"')

        echo '{
          "info": {
            "summary": "Automation Execution",
            "project": "BAZINGA"
          }
        }' > test-exec.json

        curl -X POST "https://xray.cloud.getxray.app/api/v2/import/execution/cucumber/multipart" \
          -H "Authorization: Bearer $TOKEN" \
          -F "info=@test-exec.json" \
          -F "results=@build/cucumber-report.json"
      else
        echo "cucumber-report.json not found!"
      fi

  - name: Load previous Allure history
    uses: actions/checkout@v4
    with:
      ref: gh-pages
      path: gh-pages
    continue-on-error: true

  - name: Generate Allure Report
    run: ./gradlew allureReport

  - name: Copy Allure history
    run: |
      mkdir -p build/reports/allure-report/history
      cp -r gh-pages/allure-report/history/* build/reports/allure-report/history/ || true  

  - name: Deploy Allure Report
    uses: peaceiris/actions-gh-pages@v4
    with:
      github_token: ${{ secrets.GITHUB_TOKEN }}
      publish_dir: build/reports/allure-report
